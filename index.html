<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Miles - Razorpay Test Portal</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f7f6; }
        .container { max-width: 600px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
        button:disabled { background-color: #cccccc; cursor: not-allowed; }
        .log-box { background: #1e1e1e; color: #00ff00; padding: 15px; margin-top: 20px; border-radius: 5px; font-family: monospace; height: 300px; overflow-y: auto; white-space: pre-wrap; }
        h2 { text-align: center; color: #333; }
    </style>
</head>
<body>

<div class="container">
    <h2>Test Payment Flow</h2>
    <p><strong>Appointment ID:</strong> 2</p>
    <p><strong>Amount:</strong> ₹1800.00</p>

    <button id="payButton" onclick="startPaymentFlow()">Start Payment Process</button>

    <div class="log-box" id="logBox">System Ready...</div>
</div>

<script>
    const BASE_URL = 'http://localhost:8080/api/transaction';
    const TEST_APPOINTMENT_ID = 4;
    const TEST_PRICE = 1800.00;

    // Helper to log messages to the UI
    function logMessage(msg) {
        const logBox = document.getElementById('logBox');
        logBox.innerHTML += `\n[${new Date().toLocaleTimeString()}] ${msg}`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    async function startPaymentFlow() {
        const btn = document.getElementById('payButton');
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            // STEP 1: Fetch Credentials
            logMessage("1. Fetching Razorpay credentials...");
            const credResponse = await fetch(`${BASE_URL}/cred`);
            const credData = await credResponse.json();

            if (!credData.status) throw new Error("Failed to fetch credentials");
            const razorpayKeyId = credData.response.publish;
            logMessage("SUCCESS: Key Fetched.");

            // STEP 2: Create Payment Intent
            logMessage("2. Creating Payment Intent...");
            const intentResponse = await fetch(`${BASE_URL}/payment-intent`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    appointmentId: TEST_APPOINTMENT_ID,
                    price: TEST_PRICE
                })
            });
            const intentData = await intentResponse.json();

            if (!intentData.status) throw new Error(intentData.message || "Intent failed");
            const orderId = intentData.response.transactionId; // Generated by Spring Boot
            logMessage(`SUCCESS: Order created. ID: ${orderId}`);

            // STEP 3: Open Razorpay UI
            logMessage("3. Opening Razorpay Checkout...");
            var options = {
                "key": razorpayKeyId,
                "amount": TEST_PRICE * 100, // paise
                "currency": "INR",
                "name": "Miles Project Test",
                "description": "Test Transaction",
                "order_id": orderId,
                "handler": async function (response) {
                    // This function runs when payment is successful in the UI
                    logMessage(`SUCCESS: Payment captured. Pay ID: ${response.razorpay_payment_id}`);

                    // STEP 4: Verify Payment on Backend
                    await verifyPayment(
                        response.razorpay_order_id,
                        response.razorpay_payment_id,
                        response.razorpay_signature
                    );
                },
                "prefill": {
                    "name": "Koushik Test",
                    "email": "test@miles.com",
                    "contact": "9999999999"
                },
                "theme": {
                    "color": "#3399cc"
                }
            };

            var rzp1 = new Razorpay(options);

            // Handle modal close or failure
            rzp1.on('payment.failed', function (response){
                logMessage(`FAILED: Payment Failed. Reason: ${response.error.description}`);
                resetButton(btn);
            });

            rzp1.open();

        } catch (error) {
            logMessage(`ERROR: ${error.message}`);
            resetButton(btn);
        }
    }

    async function verifyPayment(orderId, paymentId, signature) {
        try {
            logMessage("4. Verifying Signature on backend...");

            const verifyResponse = await fetch(`${BASE_URL}/verify-payment`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    appointmentId: TEST_APPOINTMENT_ID, // Required based on your updated service logic
                    razorpayOrderId: orderId,
                    razorpayPaymentId: paymentId,
                    razorpaySignature: signature
                })
            });

            const verifyData = await verifyResponse.json();

            if (verifyData.status) {
                logMessage("✅ FULL SUCCESS: Payment Verified and saved to database!");
            } else {
                throw new Error(verifyData.message || "Verification Failed");
            }
        } catch (error) {
            logMessage(`❌ VERIFY ERROR: ${error.message}`);
        } finally {
            resetButton(document.getElementById('payButton'));
        }
    }

    function resetButton(btn) {
        btn.disabled = false;
        btn.innerText = "Start Payment Process";
    }
</script>

</body>
</html>
